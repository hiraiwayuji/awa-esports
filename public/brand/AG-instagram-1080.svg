<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b1f"/>
      <stop offset="50%" stop-color="#0e1235"/>
      <stop offset="100%" stop-color="#1a0a2c"/>
    </linearGradient>
    <linearGradient id="agShieldGradBig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#2DFFB7"/>
    </linearGradient>
    <linearGradient id="brandText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2D95"/>
      <stop offset="50%" stop-color="#9B5CFF"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
    <filter id="shieldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- grid lines -->
  <g stroke="#00F0FF" stroke-width="0.6" opacity="0.08">
    <line x1="0" y1="216" x2="1080" y2="216"/>
    <line x1="0" y1="432" x2="1080" y2="432"/>
    <line x1="0" y1="648" x2="1080" y2="648"/>
    <line x1="0" y1="864" x2="1080" y2="864"/>
    <line x1="216" y1="0" x2="216" y2="1080"/>
    <line x1="432" y1="0" x2="432" y2="1080"/>
    <line x1="648" y1="0" x2="648" y2="1080"/>
    <line x1="864" y1="0" x2="864" y2="1080"/>
  </g>

  <!-- corner brackets (cyber) -->
  <g stroke="#00F0FF" stroke-width="3" fill="none" opacity="0.5">
    <path d="M 50 50 L 50 130 M 50 50 L 130 50"/>
    <path d="M 1030 50 L 1030 130 M 1030 50 L 950 50"/>
    <path d="M 50 1030 L 50 950 M 50 1030 L 130 1030"/>
    <path d="M 1030 1030 L 1030 950 M 1030 1030 L 950 1030"/>
  </g>

  <!-- eyebrow -->
  <text
    x="540"
    y="200"
    text-anchor="middle"
    font-family="Orbitron, 'Arial Black', sans-serif"
    font-weight="700"
    font-size="22"
    fill="#00F0FF"
    letter-spacing="14"
  >EST. 2026 / TOKUSHIMA</text>

  <!-- shield (scaled 14x, centered) -->
  <g transform="translate(260,260) scale(14)" filter="url(#shieldGlow)">
    <path
      d="M 20 3 L 37 8 L 37 24 C 37 33 30 39 20 41 C 10 39 3 33 3 24 L 3 8 Z"
      fill="rgba(7,11,31,0.7)"
      stroke="url(#agShieldGradBig)"
      stroke-width="1.6"
      stroke-linejoin="round"
    />
    <text
      x="20"
      y="27.5"
      text-anchor="middle"
      font-family="Orbitron, 'Arial Black', sans-serif"
      font-weight="900"
      font-size="14"
      fill="#FFFFFF"
      letter-spacing="-0.5"
    >AG</text>
  </g>

  <!-- AWAKEN GLOW -->
  <text
    x="540"
    y="900"
    text-anchor="middle"
    font-family="Orbitron, 'Arial Black', sans-serif"
    font-weight="900"
    font-size="96"
    fill="url(#brandText)"
    letter-spacing="14"
  >AWAKEN GLOW</text>

  <!-- subtitle -->
  <text
    x="540"
    y="975"
    text-anchor="middle"
    font-family="Orbitron, 'Arial Black', sans-serif"
    font-weight="700"
    font-size="26"
    fill="#FFFFFF"
    opacity="0.55"
    letter-spacing="22"
  >FROM AWA TO THE WORLD</text>
</svg>
